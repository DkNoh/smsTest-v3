<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- CoreUI Header 컴포넌트 -->
    <header class="header header-sticky p-0 border-bottom" th:fragment="header" style="z-index: 10;">
        <div class="container-fluid px-3" style="min-height: 56px;">

            <!-- 사이드바 토글 버튼 (왼쪽 끝) -->
            <button id="sidebarToggleBtn" type="button" title="사이드바 접기/펼치기"
                    class="btn btn-link p-0 me-3 text-secondary d-flex align-items-center"
                    style="text-decoration:none; box-shadow:none;">
                <i id="toggleIcon" data-lucide="panel-left-close" class="layout-icon"></i>
            </button>

            <!-- 현재 페이지 타이틀 렌더링 -->
            <ul class="header-nav d-none d-md-flex">
                <li class="nav-item">
                    <span class="nav-link fs-6 fw-bold text-dark" id="headerTitle"></span>
                </li>
            </ul>

            <!-- 사용자/로그아웃 메뉴 -->
            <ul class="header-nav ms-auto">
                <li class="nav-item d-flex align-items-center">
                    <span class="me-2 text-secondary" style="font-size: 0.9rem;"
                          th:text="${user != null ? user.empNm + ' 님 (' + user.depNm + ')' : ''}">사용자 님</span>
                    <div class="avatar avatar-md border bg-light text-dark fw-bold me-3" style="width: 32px; height: 32px; font-size: 0.85rem; display: flex; align-items: center; justify-content: center;">A</div>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="m-0 d-flex align-items-center">
                        <button type="submit" class="btn btn-link nav-link px-0 text-secondary" title="로그아웃" style="text-decoration: none;">
                            <i data-lucide="log-out" class="layout-icon"></i>
                        </button>
                    </form>
                </li>
            </ul>
        </div>

        <!-- 현재 URL 기반 메뉴 활성화 및 타이틀 세팅 -->
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const currentPath = window.location.pathname;

                document.querySelectorAll('.nav-group-items .nav-link').forEach(link => {
                    const href = link.getAttribute('href');

                    if (href === currentPath) {
                        link.classList.add('active');

                        const parentGroup = link.closest('.nav-group');
                        if (parentGroup) {
                            parentGroup.classList.add('show');
                            const parentMenuText = parentGroup.querySelector('.nav-group-toggle span').textContent.trim();
                            const subMenuText = link.textContent.trim();

                            const headerTitle = document.getElementById('headerTitle');
                            if (headerTitle) {
                                headerTitle.textContent = parentMenuText + ' > ' + subMenuText;
                            }
                        }
                    }
                });
            });
        </script>
    </header>
</body>
</html>
