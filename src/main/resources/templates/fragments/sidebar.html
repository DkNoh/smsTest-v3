<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div class="sidebar bg-white border-end shadow-sm" data-coreui-theme="light" id="sidebar" th:fragment="sidebar" style="color:#495057; display:flex; flex-direction:column;">

        <!-- 로고/타이틀 -->
        <div class="sidebar-brand d-flex bg-white border-bottom border-light">
            <div class="sidebar-brand-full d-flex align-items-center px-3">
                <img th:src="@{/img/SC.png}" alt="SC 로고" width="28" height="28" class="me-2 flex-shrink-0">
                <span class="fs-5 fw-bold text-truncate text-dark">SMS전송시스템</span>
            </div>
            <div class="sidebar-brand-narrow d-none align-items-center justify-content-center" style="width:100%;">
                <img th:src="@{/img/SC.png}" alt="SC 로고" width="28" height="28">
            </div>
        </div>

        <!-- 로그인 사용자 정보 (Collapsed 시 숨김). 사용자 식별은 EMP_ID + DEP_ID -->
        <div class="px-3 py-2 bg-light border-bottom sidebar-brand-full" style="font-size:12px; color:#6c757d;" th:if="${user != null}">
            <div class="mb-1 text-truncate"><strong>사용자:</strong> <span th:text="${user.empNm} + ' (' + ${user.empId} + ')'">사용자</span></div>
            <div class="text-truncate"><strong>부서:</strong> <span th:text="${user.depNm} + ' (' + ${user.depId} + ')'">부서</span></div>
        </div>

        <!-- 메뉴 목록: Controller가 넘긴 메뉴 tree만 사용한다 -->
        <ul class="sidebar-nav flex-grow-1 overflow-auto" data-coreui="navigation" data-simplebar="">
            <th:block th:if="${menus != null and !#lists.isEmpty(menus)}">

                <li class="nav-group" th:each="parentMenu : ${menus}">
                    <a class="nav-link nav-group-toggle" href="#">
                        <th:block th:switch="${parentMenu.menuNm}">

                            <!-- 기본메뉴 : 홈 아이콘 -->
                            <svg th:case="'기본메뉴'" class="nav-icon flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                            </svg>

                            <!-- SMS발송조회 : 메시지 검색 아이콘 -->
                            <svg th:case="'SMS발송조회'" class="nav-icon flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12zm-3-5h-4v2h4v-2zm-6 0H7v2h4v-2zm6-4H7v2h10V7z"/>
                            </svg>

                            <!-- 캠페인SMS : 발송(종이비행기) 아이콘 -->
                            <svg th:case="'캠페인SMS'" class="nav-icon flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>

                            <!-- 시스템관리 : 설정 슬라이더(tune) 아이콘 -->
                            <svg th:case="'시스템관리'" class="nav-icon flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/>
                            </svg>

                            <!-- 시스템관리 계정관리 : 다중 사용자(group) 아이콘 -->
                            <svg th:case="'시스템관리 계정관리'" class="nav-icon flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                            </svg>

                            <!-- 통계 관리 : 꺾은선+막대 혼합(insights) 아이콘 -->
                            <svg th:case="'통계 관리'" class="nav-icon flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M21 8c-1.45 0-2.26 1.44-1.93 2.51l-3.55 3.56c-.3-.09-.74-.09-1.04 0l-2.55-2.55C12.26 10.44 11.45 9 10 9c-1.45 0-2.26 1.46-1.93 2.53L4.51 15.1C3.44 14.74 2 15.55 2 17c0 1.1.9 2 2 2 1.45 0 2.26-1.44 1.93-2.51l3.55-3.56c.3.09.74.09 1.04 0l2.55 2.55C12.74 16.56 13.55 18 15 18c1.45 0 2.26-1.46 1.93-2.53l3.56-3.57C21.56 12.26 23 11.45 23 10c0-1.1-.9-2-2-2z"/>
                            </svg>

                            <!-- 기본 fallback 아이콘 -->
                            <svg th:case="*" class="nav-icon flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
                            </svg>
                        </th:block>
                        <span th:text="${parentMenu.menuNm}" class="text-truncate">메뉴 그룹</span>
                    </a>
                    <ul class="nav-group-items">
                        <li class="nav-item" th:each="childMenu : ${parentMenu.children}">
                            <a class="nav-link text-truncate"
                               th:href="@{${childMenu.menuUrl != null ? childMenu.menuUrl : '#'}}"
                               th:text="${childMenu.menuNm}">하위 링크</a>
                        </li>
                    </ul>
                </li>
            </th:block>

            <th:block th:if="${menus == null or #lists.isEmpty(menus)}">
                <li class="nav-item p-3 text-danger text-center" style="font-size:13px;">
                    <span class="sidebar-brand-full">허용된 메뉴 권한이<br>존재하지 않습니다.</span>
                </li>
            </th:block>
        </ul>

    </div>
</body>
</html>
