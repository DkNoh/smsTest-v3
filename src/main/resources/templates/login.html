<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SMS V3 로그인</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-page">
<main class="login-shell">
    <section class="login-panel" aria-labelledby="loginTitle">
        <div class="brand-block">
            <p class="eyebrow">SMS V3</p>
            <h1 id="loginTitle">로그인</h1>
        </div>

        <div th:if="${param.error}" class="alert alert-error">사용자 정보를 확인할 수 없습니다.</div>
        <div th:if="${param.logout}" class="alert alert-success">로그아웃되었습니다.</div>

        <form th:action="@{/login}" method="post" class="login-form">
            <label for="empId">사번</label>
            <input id="empId" name="empId" type="text" autocomplete="username" required autofocus>

            <th:block th:if="${localMode}">
                <input name="password" type="hidden" value="LOCAL_ID_ONLY">
            </th:block>

            <th:block th:unless="${localMode}">
                <label for="password">비밀번호</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </th:block>

            <button type="submit">로그인</button>
        </form>
    </section>
</main>
</body>
</html>
