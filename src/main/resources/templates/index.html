<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{defaultLayout}">
<head>
    <title>초기 메뉴</title>
</head>
<body>
<main layout:fragment="content">

    <div class="content-header">
        <h2>업무 메뉴</h2>
    </div>

    <!-- 로그인/환경 요약 -->
    <div class="row g-3 mb-4">
        <div class="col-12 col-md-6 col-xl-3">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">
                    <div class="text-muted" style="font-size:0.85rem;">Profile</div>
                    <strong th:text="${activeProfiles}">local</strong>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-xl-3">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">
                    <div class="text-muted" style="font-size:0.85rem;">EMP</div>
                    <strong><span th:text="${user.empId}">admin</span> / <span th:text="${user.depId}">D001</span></strong>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-xl-3">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">
                    <div class="text-muted" style="font-size:0.85rem;">Roles</div>
                    <strong th:text="${#strings.listJoin(user.roleCodes, ', ')}">ROLE_ADMIN</strong>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-xl-3">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">
                    <div class="text-muted" style="font-size:0.85rem;">Sources</div>
                    <strong><span th:text="${menuSource}">static</span> / <span th:text="${roleSource}">static</span></strong>
                </div>
            </div>
        </div>
    </div>

    <!-- 메뉴 개요 -->
    <div class="row g-3" aria-label="메뉴 목록">
        <div class="col-12 col-md-6 col-xl-4" th:each="parent : ${menus}">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                    <span class="fw-medium" th:text="${parent.menuNm}">대메뉴</span>
                    <span class="text-muted" style="font-size:0.85rem;" th:text="${#lists.size(parent.children)} + '개'">0개</span>
                </div>
                <div class="card-body p-0">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item" th:each="child : ${parent.children}">
                            <a class="d-flex justify-content-between align-items-center text-decoration-none" th:href="${child.menuUrl}">
                                <span class="text-dark" th:text="${child.menuNm}">소메뉴</span>
                                <small class="text-muted" th:text="${child.menuUrl}">/url</small>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

</main>
</body>
</html>
