spring:
  application:
    name: sms-project-v3
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  thymeleaf:
    cache: false

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:8081}
  servlet:
    session:
      tracking-modes: cookie
