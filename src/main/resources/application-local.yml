spring:
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: ${SMS_DB_URL:jdbc:oracle:thin:@localhost:1521/SMS}
    username: ${SMS_DB_USERNAME:SYSTEM}
    password: ${SMS_DB_PASSWORD}

sms:
  auth:
    mode: local
  menu:
    source: static
    auth:
      # scaffold 생성기는 local 전용 개발 도구라 메뉴에 등록하지 않는다
      exclude-paths: /system/scaffold,/system/scaffold/**
  role:
    source: static
    static-default: ROLE_ADMIN